name: AI Agent Check

on:
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install requests

      - name: Run AI check
        id: ai_check
        env:
          HF_TOKEN: ${{ secrets.HF_API_TOKEN }}
        run: |
          python3 << 'PYTHON_EOF'
          import os, sys, json, glob, requests, time

          # === ФУНКЦИЯ СОХРАНЕНИЯ РЕЗУЛЬТАТА ===
          def save_result(text):
              with open("review.md", "w", encoding="utf-8") as f:
                  f.write(text)

          # === 1. ПРОВЕРКА ТОКЕНА ===
          token = os.environ.get("HF_TOKEN")
          if not token:
              print("❌ ОШИБКА: HF_API_TOKEN не найден в Secrets")
              save_result("### ❌ Ошибка настройки\n\nСекрет `HF_API_TOKEN` не найден. Обратитесь к преподавателю.")
              sys.exit(1)
          print(f"✅ Токен найден (длина: {len(token)} символов)")

          # === 2. ПОИСК ОТЧЁТА ===
          files = glob.glob("**/*report*.md", recursive=True) + glob.glob("**/*.ipynb", recursive=True)
          files = [f for f in files if ".github" not in f and "review.md" not in f]
          
          if not files:
              print("❌ Отчёт не найден")
              save_result("### ❌ Отчёт не найден\n\nДобавьте файл `report.md` или `.ipynb` в Pull Request.")
              sys.exit(1)
          
          report_file = files[0]
          print(f"✅ Найден отчёт: {report_file}")
          
          with open(report_file, "r", encoding="utf-8") as f:
              report_text = f.read()[:3000]
          print(f"✅ Отчёт прочитан (длина: {len(report_text)} символов)")

          # === 3. ПРОМПТ НА ОСНОВЕ РЕАЛЬНЫХ ФОС ===
          prompt = """Ты — ассистент преподавателя курса "Генеративный ИИ и МО" (ЮФУ, каф. САПР им. В.М. Курейчика).
Проверь отчёт студента по ФОС дисциплины.

КРИТЕРИИ ОЦЕНКИ (из ФОС):
1. СТРУКТУРА: разделы "Цель", "Ход выполнения", "Результаты", "Выводы"
2. КОМПЕТЕНЦИИ: указаны ли ПК-7.1, ПК-8.2, ПК-9.2, ПК-14.1, ПК-24.1 и т.д.
3. КОД: есть ли Python-код, библиотеки (Pandas, PyTorch, Plotly, HuggingFace)
4. РЕЗУЛЬТАТЫ: метрики (accuracy, loss, F1), графики, скриншоты

ШКАЛА (из ФОС):
- 5: без ошибок, подробный отчёт
- 4: небольшие ошибки, студент может объяснить
- 3: выполнено ≥80%, есть непонятые ошибки
- <3: выполнено <50% или нет отчёта

ОТВЕТЬ СТРОГО в Markdown:

### 🤖 Оценка ИИ-ассистента
**Предварительная оценка:** [X]/5 баллов
**Статус:** ✅ Принято / ⚠️ Доработка / ❌ Не соответствует

#### 📊 Разбор по ФОС:
- **Структура:** [комментарий]
- **Компетенции:** [указаны ли ПК? Какие добавить?]
- **Код и результаты:** [есть ли анализ?]

#### 💡 Рекомендации:
1. [совет 1]
2. [совет 2]

*Автопроверка. Окончательный балл ставит преподаватель.*"""

          # === 4. ЗАПРОС К HUGGING FACE API ===
          url = "https://api-inference.huggingface.co/models/Qwen/Qwen2.5-7B-Instruct"
          headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json"
          }
          
          # Используем простой формат inputs (работает стабильнее)
          full_prompt = prompt + "\n\nОТЧЁТ СТУДЕНТА:\n\n" + report_text
          payload = {
              "inputs": full_prompt,
              "parameters": {
                  "temperature": 0.2,
                  "max_new_tokens": 800,
                  "return_full_text": False,
                  "do_sample": False
              }
          }

          print("🧠 Отправка запроса в Hugging Face...")
          
          # === 5. RETRY-ЛОГИКА (3 попытки) ===
          ai_review = None
          for attempt in range(3):
              print(f"Попытка {attempt + 1}/3...")
              try:
                  r = requests.post(url, headers=headers, json=payload, timeout=120)
                  print(f"Статус ответа: {r.status_code}")
                  
                  if r.status_code == 200:
                      result = r.json()
                      print(f"Ответ получен: {type(result)}")
                      
                      # HF возвращает список с одним элементом
                      if isinstance(result, list) and len(result) > 0:
                          ai_review = result[0].get("generated_text", "")
                          if ai_review:
                              print("✅ Ответ получен успешно")
                              break
                      else:
                          print(f"Неожиданный формат ответа: {str(result)[:200]}")
                  
                  elif r.status_code == 503:
                      print("⏳ Модель загружается, ждём 30 сек...")
                      time.sleep(30)
                      continue
                  else:
                      print(f"❌ Ошибка API: {r.status_code}")
                      print(r.text[:500])
                      break
              except Exception as e:
                  print(f"❌ Исключение: {e}")
                  break
          
          # === 6. СОХРАНЕНИЕ РЕЗУЛЬТАТА ===
          if ai_review:
              save_result(ai_review)
              print("✅ Результат сохранён в review.md")
          else:
              error_msg = """### ⚠️ ИИ-агент временно недоступен

Модель Hugging Face не ответила. Возможные причины:
- Модель "просыпается" (первый запуск)
- Превышен лимит бесплатных запросов
- Временные проблемы на стороне HF

**Решение:** нажмите **Re-run jobs** во вкладке Actions через 2-3 минуты.

*Технические детали для преподавателя: проверьте логи в Actions.*"""
              save_result(error_msg)
              print("⚠️ Использован fallback-ответ")
              sys.exit(1)
          PYTHON_EOF

      - name: Post comment
        if: always()
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: review.md
