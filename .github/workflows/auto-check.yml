name: AI Agent Check

on:
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install requests

      - name: Run AI check
        env:
          HF_TOKEN: ${{ secrets.HF_API_TOKEN }}
        run: |
          cat << 'EOF' > check.py
          import os, sys, json, glob, requests

          token = os.environ.get("HF_TOKEN")
          if not token:
              with open("review.md","w") as f:
                  f.write("### Ошибка\n\nНе найден секрет HF_API_TOKEN в Settings > Secrets.")
              sys.exit(1)

          files = glob.glob("**/*report*.md", recursive=True) + glob.glob("**/*.ipynb", recursive=True)
          files = [f for f in files if ".github" not in f]
          if not files:
              with open("review.md","w") as f:
                  f.write("### Отчет не найден\n\nДобавьте файл report.md или .ipynb")
              sys.exit(1)

          with open(files[0], "r", encoding="utf-8") as f:
              text = f.read()[:3000]

          prompt = """Ты — ассистент преподавателя курса "Генеративный ИИ и МО" (ЮФУ).
          Проверь отчет студента по критериям:
          1. Структура: Цель, Ход выполнения, Результаты, Выводы
          2. Компетенции: указаны ли ПК-7.1, ПК-8.2, ПК-9.2, ПК-14.1, ПК-24.1
          3. Код: есть ли Python-код и библиотеки
          4. Результаты: есть ли метрики или графики

          Шкала: 5-без ошибок, 4-незначительные, 3-неполно, <3-менее 50%

          Ответь в формате Markdown:
          ### Оценка ИИ-ассистента
          **Балл:** [X]/5
          **Статус:** [Принято/Доработка/Не соответствует]
          #### Разбор:
          - Структура: ...
          - Компетенции: ...
          - Код: ...
          #### Рекомендации:
          1. ...
          2. ..."""

          r = requests.post(
              "https://api-inference.huggingface.co/models/Qwen/Qwen2.5-7B-Instruct",
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"},
              json={"messages":[{"role":"system","content":prompt},{"role":"user","content":f"Отчет:\n\n{text}"}],"temperature":0.2,"max_tokens":800},
              timeout=120
          )

          if r.status_code == 200:
              ans = r.json()["choices"][0]["message"]["content"]
              with open("review.md","w",encoding="utf-8") as f:
                  f.write(ans)
          else:
              with open("review.md","w") as f:
                  f.write(f"### Ошибка API\n\nКод: {r.status_code}. Попробуйте Re-run jobs через 2 минуты.")
              sys.exit(1)
          EOF
          python check.py

      - uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: review.md
