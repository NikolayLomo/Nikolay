name: 🤖 ИИ-Агент проверки (GigaChat + ФОС)

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: 📥 Checkout кода
        uses: actions/checkout@v4

      - name: ⚙️ Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Установка зависимостей
        run: pip install requests urllib3

      - name: 🧠 Запуск ИИ-агента GigaChat
        env:
          GIGACHAT_CLIENT_ID: ${{ secrets.GIGACHAT_CLIENT_ID }}
          GIGACHAT_CLIENT_SECRET: ${{ secrets.GIGACHAT_CLIENT_SECRET }}
          GIGACHAT_SCOPE: ${{ secrets.GIGACHAT_SCOPE }}
        run: |
          # Создаем Python-скрипт "на лету" прямо в GitHub Actions
          cat << 'PYTHON_SCRIPT' > ai_checker.py
          import os, sys, json, requests, glob, base64, urllib3

          urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)

          CLIENT_ID = os.environ.get("GIGACHAT_CLIENT_ID")
          CLIENT_SECRET = os.environ.get("GIGACHAT_CLIENT_SECRET")
          SCOPE = os.environ.get("GIGACHAT_SCOPE", "GIGACHAT_API_PERS")

          # 1. Промпт на основе ваших ФОС и РПД
          PROMPT = """Ты — строгий ассистент преподавателя курса "Генеративный ИИ и МО" (ЮФУ, каф. САПР им. В.М. Курейчика). 
          Проверь отчет студента по ФОС.

          КРИТЕРИИ (из ФОС):
          1. Структура: "Цель", "Ход выполнения", "Результаты", "Выводы".
          2. Компетенции: Явное указание индикаторов (ПК-7.1, ПК-8.2, ПК-9.2, ПК-14.1, ПК-24.1 и т.д.).
          3. Код: Наличие фрагментов Python и упоминание библиотек (Pandas, Scikit-learn, PyTorch, Hugging Face, Plotly).
          4. Результаты: Описание метрик, скриншотов или графиков.

          ШКАЛА (из ФОС):
          - 5: Без ошибок, подробный отчет.
          - 4: Небольшие ошибки, которые студент может объяснить.
          - 3: Выполнено >=80%, есть непонятые ошибки.
          - <3: Выполнено <50% или нет отчета.

          ОТВЕТЬ СТРОГО В ЭТОМ ФОРМАТЕ (Markdown):
          ### 🤖 Оценка ИИ-ассистента (GigaChat)
          **Предварительная оценка:** [X]/5 баллов
          **Статус:** ✅ Принято / ⚠️ Требует доработки / ❌ Не соответствует

          #### 📊 Детальный разбор по ФОС:
          - **Структура:** [Комментарий]
          - **Компетенции:** [Указал ли ПК-XX.X? Если нет, напиши какие добавить]
          - **Код и результаты:** [Есть ли код и анализ?]

          #### 💡 Рекомендации:
          1. [Конкретный совет 1]
          2. [Конкретный совет 2]
          *Примечание: Это автопроверка. Окончательный балл ставит преподаватель.*
          """

          def get_token():
              auth = base64.b64encode(f"{CLIENT_ID}:{CLIENT_SECRET}".encode()).decode()
              r = requests.post("https://ngw.devices.sberbank.ru:9443/api/v2/oauth",
                  headers={"Authorization": f"Basic {auth}", "RqUID": "github-actions", "Content-Type": "application/x-www-form-urlencoded"},
                  data={"scope": SCOPE}, verify=False)
              if r.status_code == 200: return r.json()["access_token"]
              print(f"❌ Ошибка токена: {r.text}"); sys.exit(1)

          def get_report():
              files = glob.glob("**/*report*.md", recursive=True) + glob.glob("**/*.ipynb", recursive=True)
              files = [f for f in files if not f.startswith('.github')]
              if not files: return "Отчет не найден (нет report.md или .ipynb)"
              with open(files[0], 'r', encoding='utf-8') as f:
                  if files[0].endswith('.ipynb'):
                      nb = json.load(f)
                      return "\n".join(["".join(c.get('source', [])) for c in nb.get('cells', []) if c.get('cell_type')=='markdown'])[:4000]
                  return f.read()[:4000]

          if not CLIENT_ID:
              print("❌ Нет GIGACHAT_CLIENT_ID в Secrets"); sys.exit(1)

          token = get_token()
          report = get_report()
          
          r = requests.post("https://gigachat.devices.sberbank.ru/api/v1/chat/completions",
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"},
              json={"model": "GigaChat", "messages": [{"role": "system", "content": PROMPT}, {"role": "user", "content": f"Отчет:\n\n{report}"}], "temperature": 0.2},
              verify=False)
          
          if r.status_code == 200:
              with open("review.md", "w", encoding="utf-8") as f:
                  f.write(r.json()["choices"][0]["message"]["content"])
              print("✅ Проверка завершена")
          else:
              print(f"❌ Ошибка GigaChat: {r.text}"); sys.exit(1)
          PYTHON_SCRIPT
          
          python ai_checker.py

      - name: 💬 Публикация комментария в PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: 'review.md'
          reactions: 'eyes'
